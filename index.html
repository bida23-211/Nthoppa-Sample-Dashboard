<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Nthoppa Debug</title>
  </head>
  <body>
    <div id="root">If you see this, the React app isn't loading yet.</div>
    <script type="module">
      import React from 'react';
      import ReactDOM from 'react-dom/client';
      import App from './NthoppaEcosystem.jsx';

      try {
        ReactDOM.createRoot(document.getElementById('root')).render(
          React.createElement(App)
        );
      } catch (err) {
        console.error("React Render Error:", err);
      }
    </script>
  </body>
</html>
